name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: ""
            features: http,jwt-simple,jwt-simple/pure-rust,moka
          - name: wasm
            target: wasm32-unknown-unknown
            features: cloudflare,http,jwt-simple,jwt-simple/pure-rust,web-crypto

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install wasm target
        if: matrix.target == 'wasm32-unknown-unknown'
        run: rustup target add wasm32-unknown-unknown

      - name: Build
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --target "${{ matrix.target }}" --features "${{ matrix.features }}"
          else
            cargo build --features "${{ matrix.features }}"
          fi

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: ""
            features: http,jwt-simple,jwt-simple/pure-rust,moka
          - name: wasm
            target: wasm32-unknown-unknown
            features: cloudflare,http,jwt-simple,jwt-simple/pure-rust,web-crypto

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install wasm target
        if: matrix.target == 'wasm32-unknown-unknown'
        run: rustup target add wasm32-unknown-unknown

      - name: Test
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo test --target "${{ matrix.target }}" --features "${{ matrix.features }}"
          else
            cargo test --features "${{ matrix.features }}"
          fi

  lint:
    name: Lint (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: ""
            features: http,jwt-simple,jwt-simple/pure-rust,moka
          - name: wasm
            target: wasm32-unknown-unknown
            features: cloudflare,http,jwt-simple,jwt-simple/pure-rust,web-crypto

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install wasm target
        if: matrix.target == 'wasm32-unknown-unknown'
        run: rustup target add wasm32-unknown-unknown

      - name: fmt
        if: matrix.target == ''
        run: cargo fmt -- --check

      - name: Clippy
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo clippy --target "${{ matrix.target }}" --features "${{ matrix.features }}"
          else
            cargo clippy --features "${{ matrix.features }}"
          fi

  examples:
    name: Examples (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: ""
            features: http,jwt-simple,jwt-simple/pure-rust
          - name: wasm
            target: wasm32-unknown-unknown
            features: http,jwt-simple,jwt-simple/pure-rust,web-crypto

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install wasm target
        if: matrix.target == 'wasm32-unknown-unknown'
        run: rustup target add wasm32-unknown-unknown

      - name: Check examples
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo check --examples --target "${{ matrix.target }}" --features "${{ matrix.features }}"
          else
            cargo check --examples --features "${{ matrix.features }}"
          fi
