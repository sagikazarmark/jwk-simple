name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DEVENV_VERSION: v1.11.2

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/devenv/
        with:
          use-flake: "true"
          version: ${{ env.DEVENV_VERSION }}
          build: "true"

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Run cargo audit
        shell: devenv shell bash -- -e {0}
        run: cargo audit

  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: x86_64-unknown-linux-gnu
            features: http,jwt-simple,jwt-simple/pure-rust,moka
          - name: wasm
            target: wasm32-unknown-unknown
            features: cloudflare,http,jwt-simple,jwt-simple/pure-rust,web-crypto

    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/devenv/
        with:
          use-flake: "true"
          version: ${{ env.DEVENV_VERSION }}
          build: "true"

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Build
        shell: devenv shell bash -- -e {0}
        run: cargo build --features "${{ matrix.features }}"

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: x86_64-unknown-linux-gnu
            features: http,jwt-simple,jwt-simple/pure-rust,moka
          - name: wasm
            target: wasm32-unknown-unknown
            features: cloudflare,http,jwt-simple,jwt-simple/pure-rust,web-crypto

    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/devenv/
        with:
          use-flake: "true"
          version: ${{ env.DEVENV_VERSION }}
          build: "true"

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Test
        shell: devenv shell bash -- -e {0}
        run: cargo test --features "${{ matrix.features }}"

  lint:
    name: Lint (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: x86_64-unknown-linux-gnu
            features: http,jwt-simple,jwt-simple/pure-rust,moka
          - name: wasm
            target: wasm32-unknown-unknown
            features: cloudflare,http,jwt-simple,jwt-simple/pure-rust,web-crypto

    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/devenv/
        with:
          use-flake: "true"
          version: ${{ env.DEVENV_VERSION }}
          build: "true"

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: fmt
        if: matrix.name == 'native'
        shell: devenv shell bash -- -e {0}
        run: cargo fmt -- --check

      - name: Clippy
        shell: devenv shell bash -- -e {0}
        run: cargo clippy --features "${{ matrix.features }}" -- -D warnings

      - name: Doc
        if: matrix.name == 'native'
        shell: devenv shell bash -- -e {0}
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --features "${{ matrix.features }}"

  examples:
    name: Examples (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: native
            target: x86_64-unknown-linux-gnu
            features: http,jwt-simple,jwt-simple/pure-rust
          - name: wasm
            target: wasm32-unknown-unknown
            features: http,jwt-simple,jwt-simple/pure-rust,web-crypto

    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/devenv/
        with:
          use-flake: "true"
          version: ${{ env.DEVENV_VERSION }}
          build: "true"

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Check examples
        shell: devenv shell bash -- -e {0}
        run: cargo check --examples --features "${{ matrix.features }}"

      - name: Run examples
        if: matrix.name == 'native'
        shell: devenv shell bash -- -e {0}
        run: |
          cargo run --example basic_usage --features "${{ matrix.features }}"
          cargo run --example jwt_verify --features "${{ matrix.features }}"
          cargo run --example http_fetch --features "${{ matrix.features }}"
